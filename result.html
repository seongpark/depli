<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>데플리</title>
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script src="https://apis.google.com/js/api.js"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fafafa;
        z-index: 9999;
        flex-direction: column;
      }
      /* 하단 플레이어 바 스타일 (검은색 반투명 블러 효과) */
      #playerBar {
        display: none; /* 기본 숨김 */
        flex-direction: column;
        padding: 0;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        margin-bottom: 12px;
        color: white;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .player-content {
        display: flex;
        padding: 12px 18px;
        min-height: 64px;
        box-sizing: border-box;
        align-items: center;
        justify-content: space-between;
      }
      .progress-container {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: rgb(255,255,255, 0.7);
        transition: width 0.1s linear;
      }
      .player-info {
        display: flex;
        align-items: center;
        overflow: hidden;
        flex: 1;
      }
      .player-info img {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        margin-right: 10px;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 2px 5px;
      }
      .player-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-controls {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-left: 10px;
      }
      .player-controls i {
        cursor: pointer;
        font-size: 20px;
        color: white;
      }
      .player-controls i:hover {
        opacity: 0.8;
      }
      #playerOverlay {
        position: fixed;
        inset: 0;
        z-index: 1040;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 0 0 calc(24px + env(safe-area-inset-bottom, 0px));
        background: rgb(8, 10, 16); /* 투명도 제거 */
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.28s ease, visibility 0.28s ease;
        overflow: hidden;
      }
      #playerOverlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: var(--overlay-bg);
        background-size: cover;
        background-position: center;
        filter: blur(80px) brightness(0.35);
        transform: scale(1.2);
        z-index: -1;
      }
      #playerOverlay.show {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .overlay-shell {
        width: 100%;
        max-width: 420px;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        color: white;
      }
      .overlay-cover-wrap {
        position: relative;
        width: 100%;
        margin-bottom: 0;
        overflow: hidden;
        border-radius: 0;
      }
      .overlay-dismiss {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 38px;
        height: 38px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: white;
        font-size: 16px;
        z-index: 3;
      }
      #largeAlbumArt {
        width: 100%;
        aspect-ratio: 1 / 1;
        box-shadow: rgba(0, 0, 0, 0.28) 0px 24px 60px;
        object-fit: cover;
        display: block;
        filter: brightness(0.92);
        transform: scale(1);
        transition: filter 0.22s ease, transform 0.22s ease;
      }
      #largeAlbumArt.lyrics-active {
        filter: blur(14px) brightness(0.72);
        transform: scale(1.08);
      }
      .overlay-song-meta {
        width: 100%;
        text-align: center;
        margin-bottom: 10px;
        padding: 0 24px;
        transition: padding 0.3s ease;
      }
      @media (min-width: 420px) {
        .overlay-song-meta {
          padding: 0;
        }
      }
      .overlay-song-title {
        font-size: 20px;
        font-weight: 800;
        line-height: 1.25;
      }
      .overlay-song-album {
        margin-top: 6px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }
      .overlay-playlist-meta {
        margin: auto 0; /* 수직 중앙 정렬 핵심 */
        position: relative;
        text-align: left;
        padding: 0 24px;
        transition: padding 0.3s ease;
      }
      @media (min-width: 420px) {
        .overlay-playlist-meta {
          padding: 0;
        }
      }
      .overlay-playlist-label {
        font-size: 11px;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
      }
      .overlay-playlist-list {
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 92px;
        overflow-y: auto;
        scrollbar-width: none;
        transition: max-height 0.3s ease;
      }
      .overlay-playlist-list.expanded {
        max-height: 220px;
        mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
      }
      .overlay-playlist-list::-webkit-scrollbar {
        display: none;
      }
      .overlay-playlist-item {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        padding: 8px 0;
        position: relative;
      }
      .playlist-toggle-btn {
        position: absolute; /* 버튼을 우측 끝으로 고정 */
        right: 0;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        padding: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: color 0.2s ease;
      }
      .playlist-toggle-btn:hover {
        color: white;
      }
      .overlay-playlist-cover {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        object-fit: cover;
        box-shadow: rgba(0, 0, 0, 0.16) 0px 3px 10px;
        flex-shrink: 0;
      }
      .overlay-playlist-text {
        min-width: 0;
      }
      .overlay-playlist-title {
        font-size: 14px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .overlay-playlist-subtitle {
        margin-top: 2px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.54);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .overlay-playlist-empty {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.42);
      }
      .overlay-progress-wrap {
        width: 100%;
        margin-bottom: 18px;
        padding: 0;
      }
      .overlay-progress-meta {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        padding: 0 12px;
        transition: padding 0.3s ease;
      }
      @media (min-width: 420px) {
        .overlay-progress-meta {
          padding: 0;
        }
      }
      #lyricsContainer {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        color: white;
        font-size: 15px;
        line-height: 1.55;
        padding: 0 22px;
        background: rgba(6, 8, 12, 0.24);
        border-radius: 0;
        border: none;
        scroll-behavior: smooth;
        scrollbar-width: none;
        isolation: isolate;
        z-index: 1;
        box-sizing: border-box;
      }
      #lyricsContainer::after {
        display: none;
      }
      #lyricsContainer::before {
        display: none;
      }
      #lyricsContainer::-webkit-scrollbar {
        display: none;
      }
      .lyrics-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.88);
        font-size: 13px;
        text-align: center;
      }
      .lyrics-loading .spinner-border {
        width: 22px;
        height: 22px;
        border-width: 0.18em;
      }
      .lyrics-track {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        justify-content: flex-start;
        min-height: max-content;
        padding: 50% 0;
        text-align: center;
        box-sizing: border-box;
      }
      .lyric-line {
        width: 100%;
        padding: 4px 10px;
        opacity: 0.22;
        color: rgba(255, 255, 255, 0.5);
        transition: opacity 0.22s ease, color 0.22s ease, transform 0.22s ease, filter 0.22s ease;
        word-break: keep-all;
        overflow-wrap: anywhere;
        filter: blur(0.2px);
      }
      #lyricsContainer.plain-lyrics .lyric-line {
        opacity: 0.9;
        color: rgba(255, 255, 255, 0.9);
      }
      .lyric-line.active {
        opacity: 1;
        color: #fff;
        font-weight: 800;
        transform: scale(1.06);
        filter: blur(0);
      }
      .play {
        width: 36px;
        text-align: center;
        display: inline-block;
      }
      .volume-container {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding: 12px 24px;
        transition: padding 0.3s ease;
      }
      @media (min-width: 420px) {
        .volume-container {
          padding: 12px 0;
        }
      }
      .overlay-main-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 44px;
        width: 100%;
        margin-top: auto;
        margin-bottom: 20px;
        padding: 0 24px;
        transition: padding 0.3s ease;
      }
      @media (min-width: 420px) {
        .overlay-main-controls {
          padding: 0;
        }
      }
      .overlay-main-controls i {
        color: white;
        cursor: pointer;
      }
      .overlay-sub-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 80px;
        width: 100%;
        margin-top: 10px;
      }
      .overlay-control-btn {
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: white;
        font-size: 16px;
        transition: opacity 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
      }
      .overlay-control-btn:disabled {
        opacity: 0.35;
      }
      .overlay-control-btn.is-off {
        opacity: 0.48;
      }
      .overlay-main-controls #overlayPrevBtn,
      .overlay-main-controls #overlayNextBtn {
        font-size: 28px;
        opacity: 0.86;
      }
      .overlay-main-controls #overlayPlayBtn {
        width: 48px;
        height: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: white;
        font-size: 40px;
        box-shadow: none;
      }
      body.player-overlay-open {
        overflow: hidden;
      }
      .volume-container i {
        color: white;
        font-size: 14px;
        width: 16px;
      }
      .volume-slider-container {
        flex: 1;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
      }
      .volume-slider-bar {
        width: 100%;
        height: 100%;
        background: rgb(255,255,255, 0.7);
        border-radius: 2px;
        position: relative;
      }
      .volume-knob {
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 5px rgba(0,0,0,0.3);
        cursor: grab;
      }
      .volume-knob:active {
        cursor: grabbing;
        transform: translateY(-50%) scale(1.1);
      }
      @media (hover: none) and (pointer: coarse) {
        .volume-container {
          visibility: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <p class="bold">플레이리스트를 만들고 있어요.</p>
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    <div class="container" style="margin-top: 40px">
      <h2 class="highlight">
        선택하신 키워드로<br />
        <span style="color: #57c3c5">플레이리스트</span>를 만들었어요!
      </h2>

      <div class="mt-3">
        <span class="detail">
          <i class="fa-solid fa-headphones"></i> &nbsp;<span id="count">0</span>곡 · 
          <i class="fa-regular fa-clock"></i> &nbsp;약 <span id="time">0분</span>
        </span>
      </div>

      <div class="d-flex gap-2 mt-2 justify-content-end">
        <button
          type="button"
          class="btn btn-secondary btn-sm"
          id="makepli"
          style="
            border-radius: 10px;
            background-color: rgb(0, 0, 0, 10%);
            border: none;
            color: #585858;
          "
        >
          <i class="fa-solid fa-file-export"></i> YouTube 재생목록 만들기
        </button>
        <button
          type="button"
          class="btn btn-primary btn-sm"
          id="playAllInternal"
          style="
            border-radius: 10px;
            background-color: #57c3c5;
            border: none;
            color: white;
          "
        >
          <i class="fa-solid fa-play"></i> 전체 재생
        </button>
      </div>

      <div style="margin-top: 22px"></div>
      <span id="songDetail" style="color: gray; font-size: 14px"
        ><i class="fa-regular fa-circle-check"></i> 완전히 일치하는 노래</span
      >
      <span id="songDetailAlert" style="color: gray; font-size: 14px"
        ><i class="fa-solid fa-circle-info"></i> 결과가 없어 비슷한 노래를
        표시합니다.</span
      >
      <div id="songList" class="mt-2"></div>

      <div style="margin-top: 10px"></div>
      <span id="similarDetail" style="color: gray; font-size: 14px"
        ><i class="fa-solid fa-code-compare"></i> 비슷한 노래</span
      >

      <div id="similarSong" class="mt-2"></div>

      <div style="height: 180px"></div>
      <div id="playerOverlay" aria-hidden="true">
        <div class="overlay-shell">
          <div class="overlay-cover-wrap">
            <button type="button" class="overlay-dismiss" id="minimizePlayerBtn" aria-label="플레이어 닫기">
              <i class="fa-solid fa-chevron-down"></i>
            </button>
            <img id="largeAlbumArt" src="favicon.png" alt="앨범 커버">
            <div id="lyricsContainer">가사를 불러오는 중입니다...</div>
          </div>
          <div class="overlay-progress-wrap">
            <div class="progress-container" id="overlayProgressContainer">
              <div class="progress-bar" id="overlayProgressBar"></div>
            </div>
            <div class="overlay-progress-meta">
              <span id="currentTimeLabel">0:00</span>
              <span id="durationLabel">0:00</span>
            </div>
          </div>
          <div class="overlay-song-meta">
            <div id="overlayTitle" class="overlay-song-title">재생 중인 곡이 없습니다</div>
            <div id="overlayAlbum" class="overlay-song-album">플레이리스트를 시작해보세요</div>
          </div>
          <div class="overlay-playlist-meta">
            <div class="overlay-playlist-label">다음 재생</div>
            <div id="overlayPlaylist" class="overlay-playlist-list"></div>
          </div>
          <div class="overlay-main-controls">
            <i class="fa-solid fa-backward-step" id="overlayPrevBtn"></i>
            <i class="fa-solid fa-play fa-fw" id="overlayPlayBtn"></i>
            <i class="fa-solid fa-forward-step" id="overlayNextBtn"></i>
          </div>

          <div class="volume-container">
            <i class="fa-solid fa-volume-high" id="volumeIcon"></i>
            <div class="volume-slider-container" id="volumeSliderContainer">
              <div class="volume-slider-bar" id="volumeSliderBar">
                <div class="volume-knob"></div>
              </div>
            </div>
          </div>

          <div class="overlay-sub-controls">
            <button type="button" class="overlay-control-btn" id="lyricsToggleBtn" aria-label="가사 끄기">
              <i class="fa-solid fa-closed-captioning"></i>
            </button>
            <button type="button" class="overlay-control-btn" id="openYoutubeBtn" aria-label="유튜브에서 열기">
              <i class="fa-brands fa-youtube"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="fixed-bottom">
        <div class="d-grid container">
          <div id="playerBar">
            <div class="player-content">
              <div class="player-info">
                <img id="currentCover" src="favicon.png" alt="앨범 커버">
                <div class="player-text">
                  <div id="currentTitle" class="bold" style="font-size: 14px;">재생 중인 곡이 없습니다</div>
                  <div id="currentAlbum" style="font-size: 11px; opacity: 0.9;">플레이리스트를 시작해보세요</div>
                </div>
              </div>
              <div class="player-controls">
                <i class="fa-solid fa-backward-step" id="prevBtn"></i>
                <i class="fa-solid fa-play" id="mainPlayBtn"></i>
                <i class="fa-solid fa-forward-step" id="nextBtn"></i>
                <i class="fa-solid fa-xmark" id="closePlayerBtn" style="margin-left: 5px; opacity: 0.7;"></i>
              </div>
            </div>
            <div class="progress-container" id="progressContainer">
              <div class="progress-bar" id="progressBar"></div>
            </div>
          </div>
          
          <!-- 다시 만들기 버튼 -->
          <a
            class="btn btn-primary letsmake btn-lg mb-3"
            type="button"
            href="index.html"
          >
            다시 만들기
          </a>
        </div>
      </div>
    </div>

    <div id="player"></div>

    <!-- YouTube Export Modal -->
    <div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none;">
          <div class="modal-header" style="border-bottom: none; padding-top: 25px;">
            <h5 class="modal-title bold" id="exportModalLabel" style="width: 100%; text-align: center;">YouTube 재생목록 내보내기</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="position: absolute; right: 20px;"></button>
          </div>
          <div class="modal-body" style="padding: 20px 25px 30px 25px; text-align: center; color: #585858;">
            어떤 곡들을 유튜브 재생목록으로 내보낼까요?
          </div>
          <div class="modal-footer" style="border-top: none; padding: 0 25px 25px 25px; display: flex; flex-direction: column; gap: 10px;">
            <button type="button" class="btn btn-primary" id="exportAll" style="width: 100%; border-radius: 12px; padding: 12px; background-color: #57c3c5; border: none;">비슷한 곡까지 포함해서 내보내기</button>
            <button type="button" class="btn btn-secondary" id="exportExact" style="width: 100%; border-radius: 12px; padding: 12px; background-color: #f0f0f0; border: none; color: #585858;">완전히 일치하는 곡만 내보내기</button>
            <p style="font-size: 12px; color: #a0a0a0; margin-top: 5px; text-align: center;">
              <i class="fa-solid fa-circle-info"></i> 모든 곡이 내보내지지 않는다면 브라우저 설정에서 팝업을 항상 허용해 주세요.
            </p>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-Km8ylRGRbzLFeX3rwU8BmHnPtqUuX2qfZeVizLPBkvY="
      crossorigin="anonymous"
    ></script>
    <script src="result.js"></script>

    <script>
      window.onload = function () {
        // 로딩 화면을 표시하는 코드
        setTimeout(function () {
          var loading = document.querySelector(".loading");
          loading.style.transition = "opacity 0.1s";
          loading.style.opacity = "0";
          setTimeout(function () {
            loading.style.display = "none";
          }, 500);
          var container = document.querySelector(".container");
          container.style.display = "block";
